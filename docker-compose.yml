services:
  qcalendar_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qcalendar_api
    restart: always
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://qcalendar_user:qcal2026secure@siscont_db:5432/qcalendar
      SECRET_KEY: qsd2026secretkey
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      TZ: America/Lima
    networks:
      - siscont-erp_default
    depends_on:
      - qcalendar_frontend

  qcalendar_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qcalendar_frontend
    restart: always
    ports:
      - "3001:80"
    networks:
      - siscont-erp_default

networks:
  siscont-erp_default:
    external: true
