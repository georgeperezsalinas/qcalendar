services:
  qcalendar_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qcalendar_api
    restart: always
    ports:
      - "127.0.0.1:8003:8001"
    environment:
      DATABASE_URL: postgresql://qcalendar_user:qcal2026secure@siscont_db:5432/qcalendar
      SECRET_KEY: qsd2026secretkey
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      TZ: America/Lima
    networks:
      - siscont-erp_default
      - qcal_internal

  qcalendar_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qcalendar_frontend
    restart: always
    ports:
      - "127.0.0.1:3003:80"
    networks:
      - siscont-erp_default
      - qcal_internal

networks:
  siscont-erp_default:
    external: true
  qcal_internal:
    driver: bridge